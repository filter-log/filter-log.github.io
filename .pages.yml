media:
  input: assets/images
  output: /assets/images

settings:
  hide: true
  content:
    merge: true

content:
  - name: posts
    label: 블로그 글
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    subfolders: false
    view:
      primary: title
      fields: [title, date, group, category]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        label: 레이아웃
        type: string
        hidden: true
        default: post
      - name: title
        label: 제목
        type: string
        required: true
      - name: date
        label: 날짜
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: group
        label: 대분류
        type: select
        required: true
        options:
          values:
            - value: "notice"
              label: 공지
            - value: "11th"
              label: 11기
            - value: "12th"
              label: 12기
      - name: category
        label: 카테고리
        type: select
        description: 공지는 카테고리를 설정 x, 정기출사면 `정기출사`, 공지면 `일반공지`를 선택해 주세요.
        options:
          values:
            - value: "regular"
              label: 정기출사
            - value: "flash"
              label: 번개출사
            - value: "special"
              label: ★ 특별편 ★
            - value: "exhibition"
              label: 전시회
      - name: coverImage
        label: 대표 이미지
        type: image
        description: 목록과 글 상세 상단에 보여줄 대표 이미지를 선택합니다.
        options:
          path: assets/images
      - name: summary
        label: 요약
        type: string
        description: 홈과 전체 글 목록에 보여줄 짧은 소개 문구입니다.
      - name: tags
        label: 태그
        type: string
        list: true
        description: "예: 11기, 정기출사, 한강공원"
      - name: body
        label: 본문
        type: rich-text
        default: |
          ## 기본 정보

          - 일시:
          - 장소:
          - 참여 인원:

          ## 활동 내용

          내용을 작성해 주세요.
        options:
          path: assets/images
      - name: published
        label: 게시하기
        type: boolean
        default: true
        description: 켜두면 사이트에 바로 노출되고, 끄면 초안으로 저장되어 공개되지 않습니다.
