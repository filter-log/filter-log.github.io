settings:
  hide: true
  content:
    merge: true

content:
  - name: posts
    label: 블로그 글
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{group}-{hour}{minute}{second}.md"
    format: yaml-frontmatter
    subfolders: false
    view:
      primary: title
      fields: [title, date, group, category]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        label: 레이아웃
        type: string
        hidden: true
        default: post
      - name: title
        label: 제목
        type: string
        required: true
      - name: date
        label: 날짜
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: group
        label: 대분류
        type: select
        required: true
        options:
          values:
            - value: "notice"
              label: 공지
            - value: "11th"
              label: 11기
            - value: "12th"
              label: 12기
      - name: category
        label: 카테고리
        type: select
        required: false
        description: 공지 글이면 비워 두세요. 출사 기록 글일 때만 정기출사, 번개출사, 특별편, 전시회 중 하나를 고르면 됩니다.
        options:
          values:
            - value: "regular"
              label: 정기출사
            - value: "flash"
              label: 번개출사
            - value: "special"
              label: ★ 특별편 ★
            - value: "exhibition"
              label: 전시회
      - name: coverImage
        label: 대표 이미지 URL
        type: string
        description: 이미지 레포 갤러리에서 복사한 URL을 붙여넣으세요.
      - name: summary
        label: 요약
        type: string
        description: 홈과 전체 글 목록에 보여줄 짧은 소개 문구입니다.
      - name: tags
        label: 태그
        type: string
        list: true
        description: "예: 11기, 정기출사, 한강공원"
      - name: body
        label: 본문 (Markdown)
        type: code
        default: |
          ## 기본 정보

          - 일시:
          - 장소:
          - 참여 인원:

          ## 활동 내용

          내용을 작성해 주세요.
        options:
          language: markdown
      - name: published
        label: 게시하기
        type: boolean
        default: true
        description: 켜두면 사이트에 바로 노출되고, 끄면 초안으로 저장되어 공개되지 않습니다.
