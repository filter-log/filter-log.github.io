media:
  input: assets/images
  output: /assets/images

settings:
  content:
    merge: true

content:
  - name: posts
    label: 블로그 글
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{primary}.md"
    format: yaml-frontmatter
    subfolders: false
    view:
      primary: title
      fields: [title, date, group, category]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        label: 레이아웃
        type: string
        hidden: true
        default: post
      - name: title
        label: 제목
        type: string
        required: true
      - name: date
        label: 날짜
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: summary
        label: 요약
        type: string
      - name: group
        label: 대분류
        type: select
        required: true
        description: 기수 구분은 이 필드에서만 합니다.
        options:
          values:
            - value: "notice"
              label: 공지
            - value: "11th"
              label: 11기
            - value: "12th"
              label: 12기
      - name: category
        label: 카테고리
        type: select
        required: true
        description: 카테고리에는 기수 정보를 넣지 않습니다.
        options:
          values:
            - value: "notice_general"
              label: 일반공지
            - value: "regular"
              label: 정기출사
            - value: "flash"
              label: 번개출사
            - value: "special"
              label: ★ 특별편 ★
            - value: "exhibition"
              label: 전시회
      - name: coverImage
        label: 대표 이미지
        type: image
        options:
          path: assets/images
      - name: tags
        label: 태그
        type: string
        list: true
      - name: body
        label: 본문
        type: rich-text
        options:
          path: assets/images
